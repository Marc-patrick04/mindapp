<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindApp - Admin Dashboard</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            overflow-y: auto;
        }

        .modal-content {
            background: white;
            margin: 50px auto;
            padding: 30px;
            width: 90%;
            max-width: 800px;
            border-radius: 15px;
            position: relative;
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .close {
            cursor: pointer;
            font-size: 1.5rem;
            color: #999;
        }

        .close:hover {
            color: #E74C3C;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkbox-group input {
            width: auto;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .btn-small {
            padding: 5px 10px;
            font-size: 0.9rem;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 5px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .status-pending {
            background: #F39C12;
            color: white;
        }

        .status-contacted {
            background: #3498DB;
            color: white;
        }

        .status-resolved {
            background: #2ECC71;
            color: white;
        }

        .action-buttons {
            display: flex;
            gap: 5px;
        }

        .options-container {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 10px;
            margin-top: 10px;
        }

        .option-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .option-row input[type="text"] {
            flex: 2;
            min-width: 150px;
        }

        .option-row input[type="number"] {
            width: 100px;
        }

        .remove-option {
            background: #E74C3C;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
        }

        .add-option-btn {
            background: var(--primary-green);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        .section-title {
            margin: 15px 0 10px 0;
            font-weight: bold;
            color: var(--primary-blue);
        }

        .scale-range {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .scale-range input {
            width: 80px;
        }

        .info-text {
            font-size: 0.85rem;
            color: #666;
            margin-top: 5px;
        }

        .admin-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .admin-table th,
        .admin-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--light-gray);
        }

        .admin-table th {
            background: var(--primary-blue);
            color: white;
        }

        .admin-table tr:hover {
            background: var(--light-gray);
        }

        .points-label {
            font-size: 0.8rem;
            color: #666;
        }

        .yesno-points {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .yesno-points input {
            width: 100px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <h2 style="color: var(--primary-blue);">Admin Dashboard</h2>

            <div style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
                <button onclick="showSection('stats')" class="btn btn-primary">Statistics</button>
                <button onclick="showSection('questions')" class="btn btn-primary">Manage Questions</button>
                <button onclick="showSection('thresholds')" class="btn btn-primary">Risk Thresholds</button>
                <button onclick="showSection('requests')" class="btn btn-primary">Support Requests</button>
                <button onclick="logout()" class="btn" style="background: #E74C3C; color: white;">Logout</button>
            </div>

            <div id="statsSection" class="admin-section"></div>
            <div id="questionsSection" class="admin-section" style="display: none;"></div>
            <div id="thresholdsSection" class="admin-section" style="display: none;"></div>
            <div id="requestsSection" class="admin-section" style="display: none;"></div>
        </div>
    </div>

    <!-- Modal for Questions -->
    <div id="questionModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="questionModalTitle">Add Question</h3>
                <span class="close" onclick="closeModal('questionModal')">&times;</span>
            </div>
            <form id="questionForm">
                <input type="hidden" id="questionId">
                <div class="form-group">
                    <label>Question Text</label>
                    <textarea id="questionText" required placeholder="Enter the question..."></textarea>
                </div>
                <div class="form-group">
                    <label>Question Type</label>
                    <select id="questionType" onchange="toggleQuestionOptions()">
                        <option value="yesno">Yes/No</option>
                        <option value="scale">Scale</option>
                        <option value="checklist">Checklist (Select multiple)</option>
                        <option value="choice">Multiple Choice (Select one)</option>
                    </select>
                </div>

                <!-- Yes/No Points Container -->
                <div id="yesnoPointsContainer" style="display: none;">
                    <div class="section-title">Points for Yes/No</div>
                    <div class="options-container">
                        <div class="yesno-points">
                            <div>
                                <label>Yes Points</label>
                                <input type="number" id="yesPoints" value="1">
                            </div>
                            <div>
                                <label>No Points</label>
                                <input type="number" id="noPoints" value="0">
                            </div>
                        </div>
                        <div class="info-text">
                            💡 Points awarded when user selects Yes or No
                        </div>
                    </div>
                </div>

                <!-- Scale Range Container -->
                <div id="scaleRangeContainer" style="display: none;">
                    <div class="section-title">Scale Range & Points</div>
                    <div class="options-container">
                        <div class="scale-range">
                            <div>
                                <label>From</label>
                                <input type="number" id="scaleMin" value="1">
                            </div>
                            <div>
                                <label>To</label>
                                <input type="number" id="scaleMax" value="5">
                            </div>
                        </div>
                        <div class="info-text">
                            💡 Points = selected value (e.g., selecting 3 gives 3 points)
                        </div>
                    </div>
                </div>

                <!-- Options container for checklist and choice -->
                <div id="optionsDynamicContainer" style="display: none;">
                    <div class="section-title">Options with Points</div>
                    <div id="optionsList" class="options-container"></div>
                    <button type="button" class="add-option-btn" onclick="addOption()">+ Add Option</button>
                    <div class="info-text">
                        💡 Each option can have different points. Higher points = higher risk.
                    </div>
                </div>

                <div class="form-group">
                    <label>Display Order</label>
                    <input type="number" id="displayOrder" value="0">
                </div>
                <div class="form-group checkbox-group">
                    <input type="checkbox" id="isActive" checked>
                    <label>Active</label>
                </div>
                <div class="modal-buttons">
                    <button type="button" class="btn" onclick="closeModal('questionModal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal for Thresholds -->
    <div id="thresholdModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="thresholdModalTitle">Add Risk Threshold</h3>
                <span class="close" onclick="closeModal('thresholdModal')">&times;</span>
            </div>
            <form id="thresholdForm">
                <input type="hidden" id="thresholdId">
                <div class="form-group">
                    <label>Min Score (%)</label>
                    <input type="number" id="minScore" required>
                </div>
                <div class="form-group">
                    <label>Max Score (%)</label>
                    <input type="number" id="maxScore" required>
                </div>
                <div class="form-group">
                    <label>Risk Level</label>
                    <select id="riskLevel" required>
                        <option value="low">Low</option>
                        <option value="moderate">Moderate</option>
                        <option value="high">High</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Color Code</label>
                    <input type="color" id="colorCode" value="#2ECC71">
                </div>
                <div class="form-group">
                    <label>Recommendation Message</label>
                    <textarea id="recommendation" required placeholder="Enter recommendation message..."></textarea>
                </div>
                <div class="modal-buttons">
                    <button type="button" class="btn" onclick="closeModal('thresholdModal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('adminToken');
        if (!token) {
            window.location.href = '/admin-login';
        }

        let currentOptions = []; // For checklist and choice: [{text: "", points: 0}]
        let currentYesNoPoints = { yes: 1, no: 0 };

        async function apiCall(endpoint, options = {}) {
            try {
                const response = await fetch(`/api/admin${endpoint}`, {
                    ...options,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`,
                        ...options.headers
                    }
                });

                if (response.status === 403 || response.status === 401) {
                    localStorage.removeItem('adminToken');
                    window.location.href = '/admin-login';
                    throw new Error('Session expired');
                }

                if (options.method === 'DELETE') {
                    if (response.status === 200) {
                        return { success: true };
                    }
                    const error = await response.json();
                    throw new Error(error.error || 'Delete failed');
                }

                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.error || 'Request failed');
                }
                return data;
            } catch (error) {
                console.error('API call error:', error);
                throw error;
            }
        }

        async function showSection(section) {
            document.querySelectorAll('.admin-section').forEach(s => s.style.display = 'none');
            document.getElementById(`${section}Section`).style.display = 'block';

            if (section === 'stats') await loadStats();
            if (section === 'questions') await loadQuestions();
            if (section === 'thresholds') await loadThresholds();
            if (section === 'requests') await loadSupportRequests();
        }

        async function loadStats() {
            try {
                const stats = await apiCall('/stats');
                const container = document.getElementById('statsSection');
                container.innerHTML = `
                    <h3>Statistics</h3>
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px;">
                        <div style="padding: 20px; background: var(--light-gray); border-radius: 10px; text-align: center;">
                            <div style="font-size: 2rem;">${stats.totalAssessments}</div>
                            <div>Total Assessments</div>
                        </div>
                        <div style="padding: 20px; background: var(--light-gray); border-radius: 10px; text-align: center;">
                            <div style="font-size: 2rem;">${stats.totalSupportRequests}</div>
                            <div>Support Requests</div>
                        </div>
                        <div style="padding: 20px; background: var(--light-gray); border-radius: 10px; text-align: center;">
                            <div style="font-size: 2rem;">${stats.pendingRequests}</div>
                            <div>Pending Requests</div>
                        </div>
                    </div>
                    <h3 style="margin-top: 20px;">Risk Distribution</h3>
                    <div style="margin-top: 10px;">
                        ${stats.riskDistribution.map(r => `
                            <div style="margin: 10px 0;">
                                <strong>${r.risk_level.toUpperCase()}:</strong> ${r.count} assessments
                            </div>
                        `).join('')}
                    </div>
                `;
            } catch (error) {
                console.error('Error loading stats:', error);
                document.getElementById('statsSection').innerHTML = '<p style="color: red;">Error loading statistics</p>';
            }
        }

        async function loadQuestions() {
            try {
                const questions = await apiCall('/questions');
                const container = document.getElementById('questionsSection');
                container.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h3>Manage Questions</h3>
                        <button onclick="showQuestionModal()" class="btn btn-success">+ Add Question</button>
                    </div>
                    <div style="overflow-x: auto;">
                        <table class="admin-table">
                            <thead>
                                <tr><th>ID</th><th>Question</th><th>Type</th><th>Options/Points</th><th>Active</th><th>Order</th><th>Actions</th></tr>
                            </thead>
                            <tbody>
                                ${questions.map(q => {
                    let optionsDisplay = '-';
                    if (q.question_type === 'yesno' && q.options) {
                        optionsDisplay = `Yes:${q.options.yes || 1}pts, No:${q.options.no || 0}pts`;
                    } else if (q.question_type === 'scale' && q.scale_min && q.scale_max) {
                        optionsDisplay = `${q.scale_min}-${q.scale_max} (points = value)`;
                    } else if (q.options && Array.isArray(q.options)) {
                        optionsDisplay = q.options.map(o => `${o.text}(${o.points}pts)`).join(', ');
                    }
                    return `
                                    <tr>
                                        <td>${q.id}</td>
                                        <td style="max-width: 300px;">${(q.question_text || '').substring(0, 60)}${(q.question_text || '').length > 60 ? '...' : ''}</td>
                                        <td>${q.question_type}</td>
                                        <td style="max-width: 250px; font-size: 0.8rem;">${optionsDisplay}</td>
                                        <td>${q.is_active ? '✅' : '❌'}</td>
                                        <td>${q.display_order}</td>
                                        <td class="action-buttons">
                                            <button onclick="editQuestion(${q.id})" class="btn btn-small" style="background: var(--primary-blue); color: white;">Edit</button>
                                            <button onclick="deleteQuestion(${q.id})" class="btn btn-small" style="background: #E74C3C; color: white;">Delete</button>
                                        </td>
                                    </tr>
                                `}).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
            } catch (error) {
                console.error('Error loading questions:', error);
                document.getElementById('questionsSection').innerHTML = '<p style="color: red;">Error loading questions</p>';
            }
        }

        async function loadThresholds() {
            try {
                const thresholds = await apiCall('/thresholds');
                const container = document.getElementById('thresholdsSection');
                container.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h3>Risk Thresholds (% of total possible points)</h3>
                        <button onclick="showThresholdModal()" class="btn btn-success">+ Add Threshold</button>
                    </div>
                    <div style="overflow-x: auto;">
                        <table class="admin-table">
                            <thead>
                                <tr><th>ID</th><th>Min %</th><th>Max %</th><th>Risk Level</th><th>Color</th><th>Recommendation</th><th>Actions</th></tr>
                            </thead>
                            <tbody>
                                ${thresholds.map(t => `
                                    <tr>
                                        <td>${t.id}</td>
                                        <td>${t.min_score}%</td>
                                        <td>${t.max_score}%</td>
                                        <td><span class="status-badge status-${t.risk_level}">${t.risk_level.toUpperCase()}</span></td>
                                        <td><div style="width: 30px; height: 30px; background: ${t.color_code}; border-radius: 5px;"></div></td>
                                        <td style="max-width: 300px;">${(t.default_recommendation || '').substring(0, 50)}...</td>
                                        <td>
                                            <button onclick="editThreshold(${t.id})" class="btn btn-small" style="background: var(--primary-blue); color: white;">Edit</button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
            } catch (error) {
                console.error('Error loading thresholds:', error);
                document.getElementById('thresholdsSection').innerHTML = '<p style="color: red;">Error loading thresholds</p>';
            }
        }

        async function loadSupportRequests() {
            try {
                const requests = await apiCall('/support-requests');
                const container = document.getElementById('requestsSection');
                container.innerHTML = `
                    <h3>Support Requests</h3>
                    <div style="overflow-x: auto;">
                        <table class="admin-table">
                            <thead>
                                <tr><th>ID</th><th>User Email</th><th>Risk Level</th><th>Score</th><th>Status</th><th>Date</th><th>Actions</th></tr>
                            </thead>
                            <tbody>
                                ${requests.map(r => `
                                    <tr>
                                        <td>${r.id}</td>
                                        <td>${r.email}</td>
                                        <td><span class="status-badge status-${r.risk_level}">${(r.risk_level || 'unknown').toUpperCase()}</span></td>
                                        <td>${r.total_score}</td>
                                        <td>
                                            <select onchange="updateStatus(${r.id}, this.value)" class="status-select">
                                                <option value="pending" ${r.status === 'pending' ? 'selected' : ''}>Pending</option>
                                                <option value="contacted" ${r.status === 'contacted' ? 'selected' : ''}>Contacted</option>
                                                <option value="resolved" ${r.status === 'resolved' ? 'selected' : ''}>Resolved</option>
                                            </select>
                                        </td>
                                        <td>${new Date(r.created_at).toLocaleDateString()}</td>
                                        <td>
                                            <button onclick="viewRecommendation('${(r.recommendation || '').replace(/'/g, "\\'")}')" class="btn btn-small" style="background: var(--primary-blue); color: white;">View</button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
            } catch (error) {
                console.error('Error loading support requests:', error);
                document.getElementById('requestsSection').innerHTML = '<p style="color: red;">Error loading support requests</p>';
            }
        }

        // Dynamic options functions for checklist and choice
        function addOption(optionText = '', points = 0) {
            currentOptions.push({ text: optionText, points: points });
            renderOptionsList();
        }

        function removeOption(index) {
            currentOptions.splice(index, 1);
            renderOptionsList();
        }

        function updateOptionText(index, value) {
            currentOptions[index].text = value;
        }

        function updateOptionPoints(index, value) {
            currentOptions[index].points = parseInt(value) || 0;
        }

        function renderOptionsList() {
            const container = document.getElementById('optionsList');
            if (!container) return;

            if (currentOptions.length === 0) {
                container.innerHTML = '<p style="color: #999; text-align: center;">No options added yet. Click "+ Add Option" to add choices.</p>';
                return;
            }

            container.innerHTML = currentOptions.map((opt, idx) => `
                <div class="option-row">
                    <input type="text" 
                           placeholder="Option text" 
                           value="${escapeHtml(opt.text || '')}"
                           onchange="updateOptionText(${idx}, this.value)"
                           style="flex: 2;">
                    <input type="number" 
                           placeholder="Points" 
                           value="${opt.points || 0}"
                           onchange="updateOptionPoints(${idx}, this.value)"
                           style="width: 100px;">
                    <span class="points-label">points</span>
                    <button type="button" class="remove-option" onclick="removeOption(${idx})">✗</button>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function toggleQuestionOptions() {
            const type = document.getElementById('questionType').value;
            const yesnoContainer = document.getElementById('yesnoPointsContainer');
            const scaleContainer = document.getElementById('scaleRangeContainer');
            const dynamicContainer = document.getElementById('optionsDynamicContainer');

            yesnoContainer.style.display = 'none';
            scaleContainer.style.display = 'none';
            dynamicContainer.style.display = 'none';

            if (type === 'yesno') {
                yesnoContainer.style.display = 'block';
            } else if (type === 'scale') {
                scaleContainer.style.display = 'block';
            } else if (type === 'checklist' || type === 'choice') {
                dynamicContainer.style.display = 'block';
                if (currentOptions.length === 0) {
                    addOption('', 0);
                }
            }
        }

        async function showQuestionModal(questionId = null) {
            document.getElementById('questionModal').style.display = 'block';
            currentOptions = [];
            currentYesNoPoints = { yes: 1, no: 0 };
            document.getElementById('scaleMin').value = 1;
            document.getElementById('scaleMax').value = 5;
            document.getElementById('yesPoints').value = 1;
            document.getElementById('noPoints').value = 0;
            document.getElementById('questionId').value = '';
            document.getElementById('questionText').value = '';
            document.getElementById('questionType').value = 'yesno';
            document.getElementById('displayOrder').value = 0;
            document.getElementById('isActive').checked = true;
            renderOptionsList();

            if (questionId) {
                document.getElementById('questionModalTitle').innerText = 'Edit Question';
                try {
                    const questions = await apiCall('/questions');
                    const question = questions.find(q => q.id === questionId);
                    if (question) {
                        document.getElementById('questionId').value = question.id;
                        document.getElementById('questionText').value = question.question_text || '';
                        document.getElementById('questionType').value = question.question_type;
                        document.getElementById('displayOrder').value = question.display_order || 0;
                        document.getElementById('isActive').checked = question.is_active === true;

                        if (question.question_type === 'yesno' && question.options) {
                            document.getElementById('yesPoints').value = question.options.yes || 1;
                            document.getElementById('noPoints').value = question.options.no || 0;
                        }

                        if (question.scale_min) {
                            document.getElementById('scaleMin').value = question.scale_min;
                        }
                        if (question.scale_max) {
                            document.getElementById('scaleMax').value = question.scale_max;
                        }

                        // Handle options for checklist and choice
                        if (question.options && Array.isArray(question.options)) {
                            currentOptions = question.options.map(opt => ({
                                text: opt.text || '',
                                points: opt.points || 0
                            }));
                        } else if (question.options && typeof question.options === 'string') {
                            try {
                                const parsed = JSON.parse(question.options);
                                if (Array.isArray(parsed)) {
                                    currentOptions = parsed.map(opt => ({
                                        text: typeof opt === 'object' ? (opt.text || '') : opt,
                                        points: typeof opt === 'object' ? (opt.points || 0) : 0
                                    }));
                                }
                            } catch (e) {
                                console.error('Error parsing options:', e);
                            }
                        }

                        renderOptionsList();
                        toggleQuestionOptions();
                    }
                } catch (error) {
                    console.error('Error loading question for edit:', error);
                    alert('Error loading question data');
                }
            } else {
                document.getElementById('questionModalTitle').innerText = 'Add Question';
                document.getElementById('questionForm').reset();
                document.getElementById('questionId').value = '';
                document.getElementById('scaleMin').value = 1;
                document.getElementById('scaleMax').value = 5;
                document.getElementById('yesPoints').value = 1;
                document.getElementById('noPoints').value = 0;
                document.getElementById('isActive').checked = true;
                currentOptions = [];
                renderOptionsList();
            }
        }

        async function editQuestion(id) {
            await showQuestionModal(id);
        }

        async function deleteQuestion(id) {
            if (confirm('Are you sure you want to delete this question?')) {
                try {
                    await apiCall(`/questions/${id}`, { method: 'DELETE' });
                    alert('Question deleted successfully');
                    await loadQuestions();
                } catch (error) {
                    alert('Failed to delete question: ' + error.message);
                }
            }
        }

        async function showThresholdModal(thresholdId = null) {
            document.getElementById('thresholdModal').style.display = 'block';

            if (thresholdId) {
                document.getElementById('thresholdModalTitle').innerText = 'Edit Threshold';
                try {
                    const thresholds = await apiCall('/thresholds');
                    const threshold = thresholds.find(t => t.id === thresholdId);
                    if (threshold) {
                        document.getElementById('thresholdId').value = threshold.id;
                        document.getElementById('minScore').value = threshold.min_score;
                        document.getElementById('maxScore').value = threshold.max_score;
                        document.getElementById('riskLevel').value = threshold.risk_level;
                        document.getElementById('colorCode').value = threshold.color_code;
                        document.getElementById('recommendation').value = threshold.default_recommendation;
                    }
                } catch (error) {
                    console.error('Error loading threshold:', error);
                    alert('Error loading threshold data');
                }
            } else {
                document.getElementById('thresholdModalTitle').innerText = 'Add Threshold';
                document.getElementById('thresholdForm').reset();
                document.getElementById('thresholdId').value = '';
                document.getElementById('colorCode').value = '#2ECC71';
            }
        }

        async function editThreshold(id) {
            showThresholdModal(id);
        }

        async function updateStatus(requestId, status) {
            try {
                await apiCall(`/support-requests/${requestId}/status`, {
                    method: 'PUT',
                    body: JSON.stringify({ status, admin_notes: '' })
                });
                alert('Status updated successfully');
                await loadSupportRequests();
            } catch (error) {
                alert('Failed to update status: ' + error.message);
            }
        }

        function viewRecommendation(recommendation) {
            alert('Recommendation:\n\n' + recommendation);
        }

        // Form submission
        document.getElementById('questionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('questionId').value;
            const questionType = document.getElementById('questionType').value;

            let optionsValue = null;
            let scaleMin = null;
            let scaleMax = null;

            if (questionType === 'yesno') {
                optionsValue = {
                    yes: parseInt(document.getElementById('yesPoints').value) || 0,
                    no: parseInt(document.getElementById('noPoints').value) || 0
                };
            } else if (questionType === 'scale') {
                scaleMin = parseInt(document.getElementById('scaleMin').value);
                scaleMax = parseInt(document.getElementById('scaleMax').value);
                if (scaleMin >= scaleMax) {
                    alert('Minimum value must be less than maximum value');
                    return;
                }
            } else if (questionType === 'checklist' || questionType === 'choice') {
                const validOptions = currentOptions.filter(opt => opt.text && opt.text.trim() !== '');
                if (validOptions.length === 0) {
                    alert('Please add at least one option');
                    return;
                }
                optionsValue = validOptions;
            }

            const requestData = {
                question_text: document.getElementById('questionText').value,
                question_type: questionType,
                display_order: parseInt(document.getElementById('displayOrder').value) || 0,
                is_active: document.getElementById('isActive').checked === true,
                options: optionsValue,
                scale_min: scaleMin,
                scale_max: scaleMax
            };

            console.log('Sending data:', JSON.stringify(requestData, null, 2));

            try {
                if (id) {
                    await apiCall(`/questions/${id}`, { method: 'PUT', body: JSON.stringify(requestData) });
                    alert('Question updated successfully');
                } else {
                    await apiCall('/questions', { method: 'POST', body: JSON.stringify(requestData) });
                    alert('Question added successfully');
                }
                closeModal('questionModal');
                await loadQuestions();
                currentOptions = [];
            } catch (error) {
                console.error('Error saving question:', error);
                alert('Failed to save question: ' + (error.message || 'Unknown error'));
            }
        });

        document.getElementById('thresholdForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('thresholdId').value;
            const data = {
                min_score: parseInt(document.getElementById('minScore').value),
                max_score: parseInt(document.getElementById('maxScore').value),
                risk_level: document.getElementById('riskLevel').value,
                color_code: document.getElementById('colorCode').value,
                default_recommendation: document.getElementById('recommendation').value
            };

            try {
                if (id) {
                    await apiCall(`/thresholds/${id}`, { method: 'PUT', body: JSON.stringify(data) });
                    alert('Threshold updated successfully');
                } else {
                    await apiCall('/thresholds', { method: 'POST', body: JSON.stringify(data) });
                    alert('Threshold added successfully');
                }
                closeModal('thresholdModal');
                await loadThresholds();
            } catch (error) {
                alert('Failed to save threshold: ' + error.message);
            }
        });

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        function logout() {
            localStorage.removeItem('adminToken');
            window.location.href = '/admin-login';
        }

        window.onclick = function (event) {
            if (event.target.classList.contains('modal')) {
                event.target.style.display = 'none';
            }
        }

        showSection('stats');
    </script>
</body>

</html>
