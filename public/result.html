<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindApp - Assessment Results</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <h1>🧠 MindApp</h1>
                <p>Connect. Detect. Support.</p>
            </div>
            <div class="nav">
                <a href="/">Home</a>
                <a href="/assessment">Take Assessment</a>
                <a href="/login">Login</a>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="card result-container" id="resultContainer">
            <div id="resultContent"></div>
        </div>
    </div>

    <script>
        const sessionToken = localStorage.getItem('sessionToken');
        const riskLevel = localStorage.getItem('riskLevel');
        const recommendation = localStorage.getItem('recommendation');
        
        if (!sessionToken) {
            window.location.href = '/assessment';
        }
        
        const riskColors = {
            low: '#2ECC71',
            moderate: '#F39C12',
            high: '#E74C3C'
        };
        
        const riskEmojis = {
            low: '🟢',
            moderate: '🟡',
            high: '🔴'
        };
        
        const riskMessages = {
            low: 'You are currently at low risk. Maintain healthy habits.',
            moderate: 'You may be developing risky behavior. Consider reducing gambling and joining support.',
            high: 'You are at high risk of addiction. We recommend immediate support.'
        };
        
        const container = document.getElementById('resultContent');
        
        container.innerHTML = `
            <div style="text-align: center;">
                <div style="font-size: 5rem;">${riskEmojis[riskLevel]}</div>
                <div class="result-risk" style="color: ${riskColors[riskLevel]}; font-weight: bold;">
                    ${riskLevel.toUpperCase()} RISK
                </div>
                <div class="result-recommendation">
                    <strong>Recommendation:</strong><br>
                    ${recommendation || riskMessages[riskLevel]}
                </div>
                
                <div style="margin: 30px 0;">
                    <p>Thank you for completing this check.</p>
                    <p>Your responses help us support students better.</p>
                    <p>You are not alone—support is available.</p>
                </div>
                
                <div style="display: flex; gap: 20px; justify-content: center; flex-wrap: wrap;">
                    <a href="/assessment" class="btn" style="background: var(--primary-blue); color: white;">Take Again</a>
                    ${riskLevel !== 'low' ? 
                        `<button onclick="requestSupport()" class="btn btn-success">Get Support →</button>` : 
                        `<button onclick="showWellnessTips()" class="btn btn-success">Wellness Tips</button>`
                    }
                </div>
            </div>
        `;
        
        async function requestSupport() {
            if (!sessionToken) {
                alert('Session expired. Please take the assessment again.');
                window.location.href = '/assessment';
                return;
            }
            
            // Check if user is logged in
            const token = localStorage.getItem('userToken');
            
            if (!token) {
                // Store session token for after login
                localStorage.setItem('pendingSessionToken', sessionToken);
                if (confirm('You need to login or register to receive support. Would you like to login now?')) {
                    window.location.href = '/login';
                }
                return;
            }
            
            // Link session to user
            try {
                const response = await fetch('/api/support/link-session', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ sessionToken })
                });
                
                const result = await response.json();
                alert(result.supportMessage);
                window.location.href = '/';
            } catch (error) {
                console.error('Error requesting support:', error);
                alert('Failed to request support. Please try again later.');
            }
        }
        
        function showWellnessTips() {
            alert('Wellness Tips:\n\n• Practice mindfulness daily\n• Set spending limits\n• Find healthy alternatives to gambling\n• Talk to friends and family\n• Join our wellness workshops');
        }
    </script>
</body>
</html>
